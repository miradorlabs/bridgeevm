version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - goconst
          - gocyclo
          - prealloc
  settings:
    gocyclo:
      min-complexity: 18
    misspell:
      locale: US
